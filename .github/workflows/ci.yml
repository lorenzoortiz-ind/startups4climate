name: CI

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint + TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests (if any)
        run: npm run test --if-present
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'placeholder' }}
